dataset: home_credit
source: Kaggle Home Credit Default Risk competition
download_url: https://www.kaggle.com/competitions/home-credit-default-risk/data
license: "Kaggle competition rules \u2014 verify before redistribution"
files:
- name: application_train.csv
  required: true
  row_count: 1
  columns: 2
  header_sha256: b5d4055fae87b54631cfd243b2418907c933f442b1cdce27cf2a717c13d42634
  sha256: d7b51702e33f0a137f0a8a611391d02220d11fa04e27604ab3e2660b7552d0e2
  description: "Main application table \u2014 one row per loan application. Contains\
    \ TARGET (0/1 default flag)."
- name: application_test.csv
  required: false
  row_count: null
  columns: null
  header_sha256: null
  sha256: null
  purpose: competition_scoring_unlabeled
  description: "Test set \u2014 no TARGET column. Cannot be used for OOT AUC/KS/Lift\
    \ evaluation. For unlabeled batch scoring or competition submission only."
- name: bureau.csv
  required: true
  row_count: 1
  columns: 1
  header_sha256: 2c41daa966a6a8a50b9e93da3a34099771ad674508c6f3d85b63a5a48ec95b42
  sha256: 1b649e86a211180e73252ce474d2e9449ceba44374fa060783a16e7dd9a25450
  description: "Historical credit bureau records \u2014 one row per past credit at\
    \ other financial institutions. Join on SK_ID_CURR."
- name: bureau_balance.csv
  required: true
  row_count: 1
  columns: 2
  header_sha256: 0f407e954c15411799a110134b22b19dbba790f0279386a0e0730f955b01c960
  sha256: e725d860c92e40833e4197b568ce23712f3c3d7cd6d3b731cde497e7289afea1
  description: Monthly bureau balance snapshots. Join on SK_ID_BUREAU.
- name: previous_application.csv
  required: false
  row_count: null
  columns: null
  header_sha256: null
  sha256: null
  description: "Previous loan applications at Home Credit. Join on SK_ID_PREV \u2192\
    \ SK_ID_CURR."
- name: installments_payments.csv
  required: false
  row_count: null
  columns: null
  header_sha256: null
  sha256: null
  description: Installment payment history. Join on SK_ID_PREV.
- name: credit_card_balance.csv
  required: false
  row_count: null
  columns: null
  header_sha256: null
  sha256: null
  description: Monthly credit card balance snapshots. Join on SK_ID_PREV.
- name: POS_CASH_balance.csv
  required: false
  row_count: null
  columns: null
  header_sha256: null
  sha256: null
  description: Monthly POS and cash loan balance snapshots. Join on SK_ID_PREV.
split_policy:
  train: 80% earliest applications by derived date
  validation: 10% middle
  oot: "10% latest \u2014 document whether real-time or proxy boundary"
  unlabeled: application_test
  boundary_type_note: DAYS_* fields are relative to application date. OOT rules are
    proxy unless real calendar dates are reconstructed from available columns.
