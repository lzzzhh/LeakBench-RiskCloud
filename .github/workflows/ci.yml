name: CI

on:
  push:
    branches: [main, phase1-home-credit]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pytest pyyaml

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Verify scientific freeze lock
        run: python -m riskcloud.freeze

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v1
        with:
          args: "check --select E,F,I,N,W,UP"

  spark-iceberg-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: pip install "pyspark==3.5.3" "PyYAML>=6"
      - run: python -m case_studies.home_credit.pipelines.spark_env

  bronze-iceberg-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: pip install "pyspark==3.5.3" "PyYAML>=6" pytest
      - run: python -m pytest tests/platform/home_credit/test_bronze_iceberg_integration.py -v --tb=short
