services:
  kafka:
    image: apache/kafka:3.9.1
    container_name: riskcloud-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - ./data/kafka:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-init:
    image: apache/kafka:3.9.1
    container_name: riskcloud-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./deploy/local/kafka/init-topics.sh:/init-topics.sh
    entrypoint: ["/bin/bash", "/init-topics.sh"]

  flink-jobmanager:
    image: apache/flink:1.19.1-scala_2.12-java17
    container_name: riskcloud-flink-jm
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
        state.checkpoints.dir: file:///data/flink/checkpoints
        state.savepoints.dir: file:///data/flink/savepoints
    volumes:
      - ./data/flink/checkpoints:/data/flink/checkpoints
      - ./data/flink/savepoints:/data/flink/savepoints
    command: jobmanager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 10s
      timeout: 10s
      retries: 5

  flink-taskmanager:
    image: apache/flink:1.19.1-scala_2.12-java17
    container_name: riskcloud-flink-tm
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        state.checkpoints.dir: file:///data/flink/checkpoints
        state.savepoints.dir: file:///data/flink/savepoints
    volumes:
      - ./data/flink/checkpoints:/data/flink/checkpoints
      - ./data/flink/savepoints:/data/flink/savepoints
    command: taskmanager
