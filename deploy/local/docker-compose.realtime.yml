services:
  storage-init:
    image: alpine:3.20
    user: "0:0"
    volumes:
      - ./data/kafka:/state/kafka
      - ./data/flink/checkpoints:/state/flink/checkpoints
      - ./data/flink/savepoints:/state/flink/savepoints
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /state/kafka /state/flink/checkpoints /state/flink/savepoints
        chown -R 1000:1000 /state/kafka
        chmod -R 0777 /state/flink

  kafka:
    image: apache/kafka:3.9.1
    container_name: riskcloud-kafka
    depends_on:
      storage-init:
        condition: service_completed_successfully
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - ./data/kafka:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-init:
    image: apache/kafka:3.9.1
    container_name: riskcloud-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./deploy/local/kafka/init-topics.sh:/init-topics.sh
    entrypoint: ["/bin/bash", "/init-topics.sh"]

  flink-jobmanager:
    image: apache/flink:1.19.1-scala_2.12-java17
    container_name: riskcloud-flink-jm
    depends_on:
      storage-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
        execution.checkpointing.interval: 10s
        execution.checkpointing.mode: EXACTLY_ONCE
        state.checkpoints.dir: file:///data/flink/checkpoints
        state.savepoints.dir: file:///data/flink/savepoints
    volumes:
      - ./data/flink/checkpoints:/data/flink/checkpoints
      - ./data/flink/savepoints:/data/flink/savepoints
    command: jobmanager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 10s
      timeout: 10s
      retries: 5

  flink-taskmanager:
    image: apache/flink:1.19.1-scala_2.12-java17
    container_name: riskcloud-flink-tm
    depends_on:
      storage-init:
        condition: service_completed_successfully
      flink-jobmanager:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        execution.checkpointing.interval: 10s
        execution.checkpointing.mode: EXACTLY_ONCE
        state.checkpoints.dir: file:///data/flink/checkpoints
        state.savepoints.dir: file:///data/flink/savepoints
    volumes:
      - ./data/flink/checkpoints:/data/flink/checkpoints
      - ./data/flink/savepoints:/data/flink/savepoints
    command: taskmanager
